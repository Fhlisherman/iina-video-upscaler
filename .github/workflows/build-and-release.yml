name: Build and Release Plugin

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Build
        run: npm run build

      - name: Increment Version & Tag
        run: |
          npm version patch -m "chore: bump version to %s [skip ci]"

      - name: Push to GitHub
        run: git push origin main --follow-tags

      - name: Get New Version
        id: get_version
        run: echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Package Plugin (.iinaplgz)
        run: |
          cd Video-Upscaler.iinaplugin
          zip -r ../Video-Upscaler.iinaplgz *
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: Video-Upscaler.iinaplgz
          generate_release_notes: true